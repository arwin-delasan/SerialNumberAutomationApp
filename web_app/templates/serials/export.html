{% extends "base.html" %}
{% block title %}Export — Serial Management{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-2">Export CSV</h1>
  <p class="text-sm text-gray-500 mb-8">Downloads confirmed serial/random pairs within the selected range.</p>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-6">
    {{ error }}
  </div>
  {% endif %}

  <form method="GET" action="/export/download" class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-5">

    <div>
      <label for="start_serial" class="block text-sm font-medium text-gray-700 mb-1">Start Serial</label>
      <input
        type="number"
        id="start_serial"
        name="start_serial"
        required
        min="1"
        placeholder="e.g. 1000186"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
      />
    </div>

    <div>
      <label for="end_serial" class="block text-sm font-medium text-gray-700 mb-1">End Serial</label>
      <input
        type="number"
        id="end_serial"
        name="end_serial"
        required
        min="1"
        placeholder="e.g. 1000200"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
      />
    </div>

    <button
      type="submit"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm rounded-lg px-4 py-2.5 transition-colors"
    >
      Download CSV
    </button>

  </form>

  <p class="text-xs text-gray-400 mt-4 text-center">
    Only rows from <span class="font-semibold">confirmed</span> or <span class="font-semibold">partial</span> sessions are included.
  </p>
</div>
{% endblock %}
